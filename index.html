<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Үүрийн Шүүдэр - Lunch App</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Montserrat:wght@100;300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --accent: #d4af37;
            --bg: #080c14;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; overflow: hidden; }

        /* SPLASH SCREEN */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; justify-content: center; align-items: center; transition: 1s ease; }
        .logo-anim { width: 140px; animation: pulse 2s infinite; filter: drop-shadow(0 0 15px var(--accent)); }
        @keyframes pulse { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        /* WEEK SELECTOR */
        #weekSelector { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1500; background: radial-gradient(circle, #1a2332, #080c14); display: none; flex-direction: column; justify-content: center; align-items: center; }
        .selector-title { font-family: 'Cinzel'; letter-spacing: 5px; margin-bottom: 30px; color: var(--accent); }
        .week-opt { width: 80%; max-width: 320px; padding: 22px; margin: 10px; background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(10px); border-radius: 15px; font-family: 'Cinzel'; text-align: center; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .week-opt:hover { border-color: var(--accent); background: rgba(212, 175, 55, 0.1); }

        /* APP HEADER */
        .header { position: absolute; top: 40px; width: 100%; z-index: 100; text-align: center; pointer-events: none; }
        .week-label { font-family: 'Cinzel'; font-size: 1.4rem; letter-spacing: 8px; color: var(--accent); font-weight: 900; margin-bottom: 5px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .day-label { font-size: 1.8rem; font-weight: 200; text-transform: uppercase; letter-spacing: 3px; opacity: 0.9; }

        /* SWIPER VERTICAL */
        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }

        /* FOOD VISUALS */
        .food-wrap { width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: -20px; }
        .food-img { width: 80vw; max-width: 360px; height: auto; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6)); animation: float 6s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* NUTRITION BAR (RE-DESIGNED) */
        .nutri-grid { display: flex; gap: 8px; margin-top: 10px; width: 90%; max-width: 400px; justify-content: center; }
        .n-card { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 10px 5px; border-radius: 12px; text-align: center; backdrop-filter: blur(5px); }
        .n-card span { display: block; }
        .n-v { font-size: 0.85rem; font-weight: 800; color: #fff; }
        .n-l { font-size: 0.5rem; color: var(--accent); text-transform: uppercase; margin-top: 4px; letter-spacing: 1px; }

        /* RATING CARD */
        .bottom-ui { position: absolute; bottom: 30px; width: 90%; max-width: 420px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); backdrop-filter: blur(30px); border-radius: 25px; padding: 20px; box-sizing: border-box; text-align: center; }
        .cal-neon { color: var(--accent); font-size: 0.7rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .m-name { font-size: 0.95rem; font-weight: 300; line-height: 1.5; margin-bottom: 15px; opacity: 0.9; }
        .stars { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .star { font-size: 1.8rem; color: rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; }
        .star.active { color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.4); }
        .comment { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; font-family: 'Montserrat'; font-size: 0.75rem; resize: none; outline: none; box-sizing: border-box; height: 50px; }

        #canvas-snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; pointer-events: none; opacity: 0.4; }
        .menu-btn { position: fixed; top: 25px; left: 20px; z-index: 1600; background: var(--glass); border: 1px solid var(--border); color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: none; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <canvas id="canvas-snow"></canvas>

    <!-- Splash Screen -->
    <div id="splash">
        <img src="logo.png" class="logo-anim" alt="Logo">
    </div>

    <!-- Week Selection -->
    <div id="weekSelector">
        <h2 class="selector-title">ҮДИЙН ЦЭС</h2>
        <div class="week-opt" onclick="jumpTo(0)">1-Р ДОЛОО ХОНОГ</div>
        <div class="week-opt" onclick="jumpTo(5)">2-Р ДОЛОО ХОНОГ</div>
        <div class="week-opt" onclick="jumpTo(10)">3-Р ДОЛОО ХОНОГ</div>
    </div>

    <button class="menu-btn" id="backBtn" style="display:none;" onclick="showMenu()">☰</button>
    <audio id="bgMusic" src="bg-music.mp3" loop></audio>

    <!-- Continuous Swiper (All 15 Days) -->
    <div class="swiper">
        <div class="swiper-wrapper" id="swiperWrapper"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Нийт 15 хоолны дата
        const allMeals = [
            // WEEK 1
            { week: 1, day: "Даваа", name: "Ногооны зутан шөл, гоймонтой хуурга", cal: "640", p: "32г", f: "24г", c: "75г", fi: "10г", img: "mon1.png" },
            { week: 1, day: "Мягмар", name: "Гоймонтой шөл, нарийн мах", cal: "777", p: "38г", f: "32г", c: "87г", fi: "14г", img: "tue1.png" },
            { week: 1, day: "Лхагва", name: "Помидортой шөл, шарсан бугалаг", cal: "619", p: "34г", f: "19г", c: "82г", fi: "6г", img: "wed1.png" },
            { week: 1, day: "Пүрэв", name: "Ногоон сонгинотой хар шөл, пирожки", cal: "664", p: "31г", f: "17г", c: "100г", fi: "7г", img: "thu1.png" },
            { week: 1, day: "Баасан", name: "Хөц будаатай шөл, мантууны хавчуурга", cal: "802", p: "33г", f: "23г", c: "119г", fi: "9г", img: "fri1.png" },
            // WEEK 2 (Жишээ мэдээллүүд - Та өөрөө засаарай)
            { week: 2, day: "Даваа", name: "2-р долоо хоногийн Даваа", cal: "600", p: "30г", f: "20г", c: "80г", fi: "5г", img: "mon2.png" },
            { week: 2, day: "Мягмар", name: "2-р долоо хоногийн Мягмар", cal: "610", p: "31г", f: "21г", c: "81г", fi: "6г", img: "tue2.png" },
            { week: 2, day: "Лхагва", name: "2-р долоо хоногийн Лхагва", cal: "620", p: "32г", f: "22г", c: "82г", fi: "7г", img: "wed2.png" },
            { week: 2, day: "Пүрэв", name: "2-р долоо хоногийн Пүрэв", cal: "630", p: "33г", f: "23г", c: "83г", fi: "8г", img: "thu2.png" },
            { week: 2, day: "Баасан", name: "2-р долоо хоногийн Баасан", cal: "640", p: "34г", f: "24г", c: "84г", fi: "9г", img: "fri2.png" },
            // WEEK 3
            { week: 3, day: "Даваа", name: "3-р долоо хоногийн Даваа", cal: "650", p: "35г", f: "25г", c: "85г", fi: "10г", img: "mon3.png" },
            { week: 3, day: "Мягмар", name: "3-р долоо хоногийн Мягмар", cal: "660", p: "36г", f: "26г", c: "86г", fi: "11г", img: "tue3.png" },
            { week: 3, day: "Лхагва", name: "3-р долоо хоногийн Лхагва", cal: "670", p: "37г", f: "27г", c: "87г", fi: "12г", img: "wed3.png" },
            { week: 3, day: "Пүрэв", name: "3-р долоо хоногийн Пүрэв", cal: "680", p: "38г", f: "28г", c: "88г", fi: "13г", img: "thu3.png" },
            { week: 3, day: "Баасан", name: "3-р долоо хоногийн Баасан", cal: "690", p: "39г", f: "29г", c: "89г", fi: "14г", img: "fri3.png" }
        ];

        let mainSwiper;

        // Splash handling
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('weekSelector').style.display = 'flex';
                }, 1000);
            }, 2500);
            
            // Слайдуудыг үүсгэх
            const wrapper = document.getElementById('swiperWrapper');
            allMeals.forEach(m => {
                wrapper.innerHTML += `
                <div class="swiper-slide">
                    <div class="header">
                        <div class="week-label">WEEK ${m.week}</div>
                        <div class="day-label">${m.day}</div>
                    </div>
                    <div class="food-wrap">
                        <img src="${m.img}" class="food-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/706/706164.png'">
                        <div class="nutri-grid">
                            <div class="n-card"><span class="n-v">${m.p}</span><span class="n-l">Уураг</span></div>
                            <div class="n-card"><span class="n-v">${m.f}</span><span class="n-l">Өөх</span></div>
                            <div class="n-card"><span class="n-v">${m.c}</span><span class="n-l">Нүүрс</span></div>
                            <div class="n-card"><span class="n-v">${m.fi}</span><span class="n-l">Эслэг</span></div>
                        </div>
                    </div>
                    <div class="bottom-ui">
                        <span class="cal-neon">${m.cal} KCAL</span>
                        <div class="m-name">${m.name}</div>
                        <div class="stars"><span class="star" onclick="rate(this,1)">★</span><span class="star" onclick="rate(this,2)">★</span><span class="star" onclick="rate(this,3)">★</span><span class="star" onclick="rate(this,4)">★</span><span class="star" onclick="rate(this,5)">★</span></div>
                        <textarea class="comment" placeholder="Сэтгэгдэл үлдээх..."></textarea>
                    </div>
                </div>`;
            });

            mainSwiper = new Swiper('.swiper', {
                direction: 'vertical',
                speed: 800,
                mousewheel: true,
                effect: 'slide'
            });
        };

        function jumpTo(index) {
            document.getElementById('weekSelector').style.display = 'none';
            document.getElementById('backBtn').style.display = 'flex';
            document.getElementById('bgMusic').play().catch(() => {});
            mainSwiper.slideTo(index, 0);
        }

        function showMenu() {
            document.getElementById('weekSelector').style.display = 'flex';
            document.getElementById('backBtn').style.display = 'none';
        }

        function rate(el, score) {
            const stars = el.parentElement.querySelectorAll('.star');
            stars.forEach((s, i) => i < score ? s.classList.add('active') : s.classList.remove('active'));
        }

        // Snow Animation
        const canvas = document.getElementById('canvas-snow');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Snowflake {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() { this.x = Math.random() * canvas.width; this.y = -10; this.size = Math.random() * 2 + 1; this.speed = Math.random() * 0.5 + 0.3; this.opacity = Math.random() * 0.5; }
            update() { this.y += this.speed; if (this.y > canvas.height) this.reset(); }
            draw() { ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for (let i = 0; i < 60; i++) particles.push(new Snowflake());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
