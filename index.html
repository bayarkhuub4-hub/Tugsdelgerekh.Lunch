<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Үүрийн Шүүдэр - Lunch App</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Montserrat:wght@100;300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            /* Логоноос авсан өнгөнүүд */
            --w1: #d4af37; /* Алтлаг шар */
            --w2: #e63946; /* Дулаан улаан (Дуршил төрүүлэгч) */
            --w3: #457b9d; /* Сонгодог хөх */
            --bg-dark: #0f0f0f;
            --bg-warm: #1a1614; /* Хоолонд тохиромжтой дулаан фон */
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Montserrat', sans-serif; background: var(--bg-dark); color: white; overflow: hidden; }
        
        /* Арын фон - Тас хар биш, дулаан гүн хүрэн-саарал */
        #bgMain { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
            background: radial-gradient(circle at center, #251e1a 0%, #0c0c0c 100%);
        }

        /* SPLASH & SELECTOR */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s ease; }
        #weekSelector { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .week-opt { width: 80%; max-width: 320px; padding: 22px; margin: 12px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 15px; font-family: 'Cinzel'; text-align: center; cursor: pointer; transition: 0.4s; font-size: 1.1rem; }
        
        .opt-1 { color: var(--w1); border-color: var(--w1); }
        .opt-2 { color: var(--w2); border-color: var(--w2); }
        .opt-3 { color: var(--w3); border-color: var(--w3); }

        /* MAIN LAYOUT */
        .swiper { width: 100%; height: 100vh; display: none; }
        .swiper-slide { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 10px; box-sizing: border-box;
            justify-content: flex-start; /* Дээшээ шахах */
        }

        /* HEADER (WEEK & DAY) */
        .header { width: 100%; text-align: center; padding-top: 25px; margin-bottom: 5px; }
        .week-label { font-family: 'Cinzel'; font-size: 1.3rem; letter-spacing: 7px; font-weight: 900; }
        .day-label { font-size: 1.1rem; font-weight: 200; text-transform: uppercase; letter-spacing: 4px; margin-top: 3px; opacity: 0.8; }

        /* MEAL NAME - Зураг руу ойртсон */
        .m-name { 
            font-size: 1rem; font-weight: 600; padding: 0 30px; line-height: 1.3; 
            margin-top: 15px; color: #fff; text-align: center; max-width: 90%;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* FOOD WRAPPER - Бүх хэсгүүдийг дээшлүүлсэн */
        .content-main {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; flex: 1; 
            margin-top: -10px; /* Ерөнхийд нь дээшлүүлсэн */
        }

        .food-wrap { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .food-img { 
            width: 80vw; max-width: 350px; height: auto; 
            filter: drop-shadow(0 25px 45px rgba(0,0,0,0.8)); 
            animation: float 6s infinite ease-in-out; z-index: 5; 
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* NUTRITION & CALORIE */
        .info-overlay { 
            width: 92%; max-width: 400px; z-index: 20; 
            display: flex; flex-direction: column; align-items: center; 
            margin-top: -15px; /* Зураг руу шахах */
        }
        .cal-badge { 
            font-size: 0.8rem; font-weight: 800; letter-spacing: 2px; padding: 4px 18px; 
            background: rgba(0,0,0,0.7); border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); 
            margin-bottom: 12px; backdrop-filter: blur(5px);
        }
        .nutri-bar { display: flex; gap: 5px; width: 100%; justify-content: center; }
        .n-card { flex: 1; background: rgba(20, 18, 17, 0.85); border: 1px solid rgba(255,255,255,0.1); padding: 10px 2px; border-radius: 12px; text-align: center; backdrop-filter: blur(10px); }
        .n-v { font-size: 0.9rem; font-weight: 800; color: #fff; display: block; }
        .n-l { font-size: 0.5rem; text-transform: uppercase; font-weight: 700; display: block; margin-top: 3px; }

        /* RATING & COMMENT */
        .bottom-ui { 
            width: 92%; max-width: 440px; background: rgba(255,255,255,0.04); 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(40px); 
            border-radius: 25px; padding: 15px; box-sizing: border-box; 
            text-align: center; margin-top: 20px; margin-bottom: 30px; z-index: 100; 
        }
        .rating-container { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
        .rating-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; opacity: 0.7; }
        .stars { display: flex; gap: 5px; }
        .star { font-size: 1.8rem; color: rgba(255,255,255,0.1); cursor: pointer; }
        .comment { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; color: white; font-family: 'Montserrat'; font-size: 0.75rem; resize: none; outline: none; box-sizing: border-box; height: 45px; }

        /* WEEK THEME COLORS */
        .slide-w1 .week-label, .slide-w1 .n-l, .slide-w1 .cal-badge { color: var(--w1); }
        .slide-w1 .star.active { color: var(--w1); text-shadow: 0 0 15px var(--w1); }
        
        .slide-w2 .week-label, .slide-w2 .n-l, .slide-w2 .cal-badge { color: var(--w2); }
        .slide-w2 .star.active { color: var(--w2); text-shadow: 0 0 15px var(--w2); }

        .slide-w3 .week-label, .slide-w3 .n-l, .slide-w3 .cal-badge { color: var(--w3); }
        .slide-w3 .star.active { color: var(--w3); text-shadow: 0 0 15px var(--w3); }

        .menu-btn { position: fixed; top: 20px; left: 20px; z-index: 2500; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; }
        #canvas-snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; opacity: 0.2; }
    </style>
</head>
<body>
    <div id="bgMain"></div>
    <canvas id="canvas-snow"></canvas>

    <!-- Splash Screen -->
    <div id="splash">
        <img src="logo.png" class="logo-anim" style="width:110px;">
        <div style="font-family:'Cinzel'; margin-top:20px; text-align:center;">ТӨГСДЭЛГЭРЭХ СУРГУУЛЬ <br><span style="font-size:0.7rem; opacity:0.6;">ҮДИЙН ХООЛНЫ ЦЭС</span></div>
    </div>

    <!-- Week Selector -->
    <div id="weekSelector">
        <h2 style="font-family:'Cinzel'; letter-spacing:5px; margin-bottom:30px;">СОНГОЛТ</h2>
        <div class="week-opt opt-1" onclick="jumpTo(0)">1-Р ДОЛОО ХОНОГ</div>
        <div class="week-opt opt-2" onclick="jumpTo(6)">2-Р ДОЛОО ХОНОГ</div>
        <div class="week-opt opt-3" onclick="jumpTo(12)">3-Р ДОЛОО ХОНОГ</div>
    </div>

    <button class="menu-btn" id="backBtn" onclick="showMenu()">☰</button>
    <audio id="bgMusic" src="bg-music.mp3" loop></audio>

    <div class="swiper">
        <div class="swiper-wrapper" id="swiperWrapper"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const allMeals = [
            // WEEK 1
            { week: 1, type: 'intro' },
            { week: 1, day: "Даваа", name: "Ногооны зутан шөл, гоймонтой хуурга", cal: "640", p: "32г", f: "24г", c: "75г", fi: "10г", img: "mon1.png" },
            { week: 1, day: "Мягмар", name: "Гоймонтой шөл, нарийн мах", cal: "777", p: "38г", f: "32г", c: "87г", fi: "14г", img: "tue1.png" },
            { week: 1, day: "Лхагва", name: "Помидортой шөл, шарсан бугалаг", cal: "619", p: "34г", f: "19г", c: "82г", fi: "6г", img: "wed1.png" },
            { week: 1, day: "Пүрэв", name: "Ногоон сонгинотой хар шөл, пирожки", cal: "664", p: "31г", f: "17г", c: "100г", fi: "7г", img: "thu1.png" },
            { week: 1, day: "Баасан", name: "Хөц будаатай шөл, мантууны хавчуурга", cal: "802", p: "33г", f: "23г", c: "119г", fi: "9г", img: "fri1.png" },
            // WEEK 2
            { week: 2, type: 'intro' },
            { week: 2, day: "Даваа", name: "Өдрийн хоол 2-1", cal: "600", p: "30г", f: "20г", c: "80г", fi: "5г", img: "mon2.png" },
            { week: 2, day: "Мягмар", name: "Өдрийн хоол 2-2", cal: "610", p: "31г", f: "21г", c: "81г", fi: "6г", img: "tue2.png" },
            { week: 2, day: "Лхагва", name: "Өдрийн хоол 2-3", cal: "620", p: "32г", f: "22г", c: "82г", fi: "7г", img: "wed2.png" },
            { week: 2, day: "Пүрэв", name: "Өдрийн хоол 2-4", cal: "630", p: "33г", f: "23г", c: "83г", fi: "8г", img: "thu2.png" },
            { week: 2, day: "Баасан", name: "Өдрийн хоол 2-5", cal: "640", p: "34г", f: "24г", c: "84г", fi: "9г", img: "fri2.png" },
            // WEEK 3
            { week: 3, type: 'intro' },
            { week: 3, day: "Даваа", name: "Өдрийн хоол 3-1", cal: "650", p: "35г", f: "25г", c: "85г", fi: "10г", img: "mon3.png" },
            { week: 3, day: "Мягмар", name: "Өдрийн хоол 3-2", cal: "660", p: "36г", f: "26г", c: "86г", fi: "11г", img: "tue3.png" },
            { week: 3, day: "Лхагва", name: "Өдрийн хоол 3-3", cal: "670", p: "37г", f: "27г", c: "87г", fi: "12г", img: "wed3.png" },
            { week: 3, day: "Пүрэв", name: "Өдрийн хоол 3-4", cal: "680", p: "38г", f: "28г", c: "88г", fi: "13г", img: "thu3.png" },
            { week: 3, day: "Баасан", name: "Өдрийн хоол 3-5", cal: "690", p: "39г", f: "29г", c: "89г", fi: "14г", img: "fri3.png" }
        ];

        let mainSwiper;
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('weekSelector').style.display = 'flex';
                }, 800);
            }, 1500);
            
            const wrapper = document.getElementById('swiperWrapper');
            allMeals.forEach(m => {
                const theme = 'slide-w' + m.week;
                if(m.type === 'intro') {
                    wrapper.innerHTML += `
                    <div class="swiper-slide ${theme}">
                        <div style="text-align:center; margin-top: auto; margin-bottom: auto;">
                            <h1 class="week-label" style="font-size:3.5rem;">WEEK ${m.week}</h1>
                            <p style="letter-spacing:8px; opacity:0.6; font-size:0.8rem;">ЭХЭЛЖ БАЙНА</p>
                        </div>
                    </div>`;
                } else {
                    wrapper.innerHTML += `
                    <div class="swiper-slide ${theme}">
                        <div class="header">
                            <div class="week-label">WEEK ${m.week}</div>
                            <div class="day-label">${m.day}</div>
                        </div>
                        
                        <div class="m-name">${m.name}</div>

                        <div class="content-main">
                            <div class="food-wrap">
                                <img src="${m.img}" class="food-img" loading="eager" onerror="this.style.opacity='0.2'">
                                <div class="info-overlay">
                                    <span class="cal-badge">${m.cal} KCAL</span>
                                    <div class="nutri-bar">
                                        <div class="n-card"><span class="n-v">${m.p}</span><span class="n-l">Уураг</span></div>
                                        <div class="n-card"><span class="n-v">${m.f}</span><span class="n-l">Өөх</span></div>
                                        <div class="n-card"><span class="n-v">${m.c}</span><span class="n-l">Нүүрс</span></div>
                                        <div class="n-card"><span class="n-v">${m.fi}</span><span class="n-l">Эслэг</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="bottom-ui">
                            <div class="rating-container">
                                <div class="rating-label">ҮНЭЛГЭЕ:</div>
                                <div class="stars">
                                    <span class="star" onclick="rate(this,1)">★</span>
                                    <span class="star" onclick="rate(this,2)">★</span>
                                    <span class="star" onclick="rate(this,3)">★</span>
                                    <span class="star" onclick="rate(this,4)">★</span>
                                    <span class="star" onclick="rate(this,5)">★</span>
                                </div>
                            </div>
                            <textarea class="comment" placeholder="Сэтгэгдэл..."></textarea>
                        </div>
                    </div>`;
                }
            });

            mainSwiper = new Swiper('.swiper', { direction: 'vertical', speed: 600, mousewheel: true });
        };

        function jumpTo(index) {
            document.getElementById('weekSelector').style.display = 'none';
            document.querySelector('.swiper').style.display = 'block';
            document.getElementById('backBtn').style.display = 'flex';
            document.getElementById('bgMusic').play().catch(() => {});
            mainSwiper.update(); mainSwiper.slideTo(index, 0);
        }

        function showMenu() { document.getElementById('weekSelector').style.display = 'flex'; document.querySelector('.swiper').style.display = 'none'; document.getElementById('backBtn').style.display = 'none'; }
        function rate(el, score) { const stars = el.parentElement.querySelectorAll('.star'); stars.forEach((s, i) => i < score ? s.classList.add('active') : s.classList.remove('active')); }

        // Snow Animation
        const canvas = document.getElementById('canvas-snow');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Snowflake {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() { this.x = Math.random() * canvas.width; this.y = -10; this.size = Math.random() * 1.5 + 0.5; this.speed = Math.random() * 0.5 + 0.2; this.opacity = Math.random() * 0.3; }
            update() { this.y += this.speed; if (this.y > canvas.height) this.reset(); }
            draw() { ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for (let i = 0; i < 50; i++) particles.push(new Snowflake());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
