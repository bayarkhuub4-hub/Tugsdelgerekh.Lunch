<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Үүрийн Шүүдэр - Luxury Lunch App</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@200;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --w1: #d4af37; --w2: #e63946; --w3: #4fc3f7;
            --glass: rgba(255, 255, 255, 0.5);
            --border: rgba(255, 255, 255, 0.7);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Montserrat', sans-serif; background: #fdfaf5; 
            overflow: hidden; 
        }

        /* 1. ХАРАГДАХУЙЦ ТАНСАГ ФОН (Буцааж хэвэнд нь оруулсан) */
        #bgMain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background-color: #fdfaf5;
            background-image: radial-gradient(#d1c7bc 1px, transparent 1px);
            background-size: 25px 25px;
        }

        .mesh-aura {
            position: absolute; width: 150vw; height: 150vw; top: -25%; left: -25%;
            background: radial-gradient(circle, var(--w1) 0%, transparent 60%);
            filter: blur(80px); opacity: 0.15;
            animation: rotateAura 20s infinite linear;
            z-index: -1; transition: 1.5s ease;
        }
        @keyframes rotateAura { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* SPLASH SCREEN */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 3000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.8s ease;
        }
        .logo-img { width: 130px; margin-bottom: 25px; animation: scaleIn 1s ease-out; }
        @keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* WEEK SELECTOR */
        #weekSelector {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2500; background: rgba(255,255,255,0.95);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(30px);
        }
        .week-btn {
            width: 85%; max-width: 320px; padding: 25px; margin: 12px;
            background: #fff; border-radius: 25px; border: 1px solid #eee;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center;
            font-family: 'Cinzel'; cursor: pointer; transition: 0.3s;
        }

        /* SWIPER CONTENT */
        .swiper { width: 100%; height: 100vh; display: none; }
        .swiper-slide { display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 20px; box-sizing: border-box; }

        /* INTRO SLIDE - ЯГ ГОЛД НЬ */
        .intro-slide { justify-content: center !important; text-align: center; }
        .intro-num { font-family: 'Cinzel'; font-size: 4.5rem; font-weight: 900; margin: 0; }
        .intro-sub { font-size: 1rem; letter-spacing: 5px; font-weight: 800; opacity: 0.3; margin-top: 10px; }

        /* SLIDE HEADER */
        .slide-header { text-align: center; padding-top: 30px; z-index: 50; }
        .w-num { font-family: 'Cinzel'; font-size: 1.3rem; letter-spacing: 8px; font-weight: 900; margin: 0; }
        .d-name { font-size: 0.9rem; letter-spacing: 4px; text-transform: uppercase; margin-top: 5px; opacity: 0.5; color: #333; }
        .f-name { font-size: 1.1rem; font-weight: 800; margin-top: 20px; color: #222; max-width: 320px; line-height: 1.3; }

        /* FOOD IMAGE - ХАМГИЙН НААНА */
        .food-container { 
            flex: 1; display: flex; justify-content: center; align-items: center; 
            z-index: 150; /* Картнаас дээгүүр харагдана */
            position: relative;
        }
        .food-img { width: 88vw; max-width: 440px; filter: drop-shadow(0 20px 50px rgba(0,0,0,0.15)); animation: float 6s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* GLASS PANEL - АР ТАЛД */
        .glass-panel {
            width: 95%; max-width: 420px; padding: 20px;
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 35px;
            margin-top: -65px; /* Зурагтай давхцах зай */
            z-index: 10; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            margin-bottom: 45px;
        }

        .cal-text { font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 15px; display: block; }
        .n-row { display: flex; gap: 8px; margin-bottom: 20px; }
        .n-box { flex: 1; background: #fff; padding: 12px 2px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .n-box b { display: block; font-size: 0.85rem; color: #333; }
        .n-box i { font-style: normal; font-size: 0.5rem; text-transform: uppercase; font-weight: 700; opacity: 0.4; }

        .star-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .star { font-size: 2rem; color: rgba(0,0,0,0.08); cursor: pointer; transition: 0.3s; }
        .comment-box { width: 100%; background: rgba(255,255,255,0.6); border: 1px solid rgba(0,0,0,0.05); border-radius: 20px; padding: 12px 15px; font-family: 'Montserrat'; font-size: 0.85rem; resize: none; outline: none; box-sizing: border-box; height: 55px; }

        /* COLORS */
        body.bg-w1 .w-num, body.bg-w1 .intro-num, body.bg-w1 .cal-text, body.bg-w1 .star.active { color: var(--w1); }
        body.bg-w2 .w-num, body.bg-w2 .intro-num, body.bg-w2 .cal-text, body.bg-w2 .star.active { color: var(--w2); }
        body.bg-w3 .w-num, body.bg-w3 .intro-num, body.bg-w3 .cal-text, body.bg-w3 .star.active { color: var(--w3); }

        #backBtn { position: fixed; top: 20px; left: 20px; z-index: 2600; background: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; font-size: 1.2rem; }
        #canvas-snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; opacity: 0.3; }
    </style>
</head>
<body class="bg-w1">

    <div id="bgMain"><div id="aura" class="mesh-aura"></div></div>
    <canvas id="canvas-snow"></canvas>

    <!-- Splash Screen -->
    <div id="splash">
        <div style="text-align: center;">
            <img src="logo.png" class="logo-img">
            <div style="font-family:'Cinzel'; color:#333; font-size: 1.1rem; letter-spacing: 2px;">ТӨГСДЭЛГЭРЭХ СУРГУУЛЬ</div>
            <div style="font-size:0.7rem; letter-spacing:4px; opacity:0.4; font-weight:800; margin-top: 5px;">ҮДИЙН ХООЛНЫ ЦЭС</div>
        </div>
    </div>

    <!-- Selector -->
    <div id="weekSelector">
        <h2 style="font-family:'Cinzel'; margin-bottom:40px; letter-spacing:5px;">ЦЭС СОНГОХ</h2>
        <div class="week-btn" style="border-top: 5px solid #d4af37;" onclick="jumpTo(0)"><h3>WEEK 1</h3><small>1-р долоо хоног</small></div>
        <div class="week-btn" style="border-top: 5px solid #e63946;" onclick="jumpTo(6)"><h3>WEEK 2</h3><small>2-р долоо хоног</small></div>
        <div class="week-btn" style="border-top: 5px solid #4fc3f7;" onclick="jumpTo(12)"><h3>WEEK 3</h3><small>3-р долоо хоног</small></div>
    </div>

    <button id="backBtn" onclick="showMenu()">←</button>
    <audio id="bgMusic" src="bg-music.mp3" loop></audio>

    <div class="swiper">
        <div class="swiper-wrapper" id="swiperWrapper"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const allMeals = [
            { week: 1, type: 'intro' },
            { week: 1, day: "Даваа", name: "Ногооны зутан шөл, гоймонтой хуурга", cal: "640", p: "32г", f: "24г", c: "75г", fi: "10г", img: "mon1.png" },
            { week: 1, day: "Мягмар", name: "Гоймонтой шөл, нарийн мах", cal: "777", p: "38г", f: "32г", c: "87г", fi: "14г", img: "tue1.png" },
            { week: 1, day: "Лхагва", name: "Помидортой шөл, шарсан бугалаг", cal: "619", p: "34г", f: "19г", c: "82г", fi: "6г", img: "wed1.png" },
            { week: 1, day: "Пүрэв", name: "Ногоон сонгинотой хар шөл, пирожки", cal: "664", p: "31г", f: "17г", c: "100г", fi: "7г", img: "thu1.png" },
            { week: 1, day: "Баасан", name: "Хөц будаатай шөл, мантууны хавчуурга", cal: "802", p: "33г", f: "23г", c: "119г", fi: "9г", img: "fri1.png" },
            { week: 2, type: 'intro' },
            { week: 2, day: "Даваа", name: "Өдрийн амттай хоол 2.1", cal: "600", p: "30г", f: "20г", c: "80г", fi: "5г", img: "mon2.png" },
            { week: 2, day: "Мягмар", name: "Өдрийн амттай хоол 2.2", cal: "600", p: "30г", f: "20г", c: "80г", fi: "5г", img: "tue2.png" },
            { week: 2, day: "Лхагва", name: "Өдрийн амттай хоол 2.3", cal: "600", p: "30г", f: "20г", c: "80г", fi: "5г", img: "wed2.png" },
            { week: 2, day: "Пүрэв", name: "Өдрийн амттай хоол 2.4", cal: "600", p: "30г", f: "20г", c: "80г", fi: "5г", img: "thu2.png" },
            { week: 2, day: "Баасан", name: "Өдрийн амттай хоол 2.5", cal: "600", p: "30г", f: "20г", c: "80г", fi: "5г", img: "fri2.png" },
            { week: 3, type: 'intro' },
            { week: 3, day: "Даваа", name: "Өдрийн амттай хоол 3.1", cal: "650", p: "35г", f: "25г", c: "85г", fi: "10г", img: "mon3.png" },
            { week: 3, day: "Мягмар", name: "Өдрийн амттай хоол 3.2", cal: "650", p: "35г", f: "25г", c: "85г", fi: "10г", img: "tue3.png" },
            { week: 3, day: "Лхагва", name: "Өдрийн амттай хоол 3.3", cal: "650", p: "35г", f: "25г", c: "85г", fi: "10г", img: "wed3.png" },
            { week: 3, day: "Пүрэв", name: "Өдрийн амттай хоол 3.4", cal: "650", p: "35г", f: "25г", c: "85г", fi: "10г", img: "thu3.png" },
            { week: 3, day: "Баасан", name: "Өдрийн амттай хоол 3.5", cal: "650", p: "35г", f: "25г", c: "85г", fi: "10г", img: "fri3.png" }
        ];

        let mainSwiper;
        let introTimer;

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('weekSelector').style.display = 'flex';
                }, 800);
            }, 1800);
            
            const wrapper = document.getElementById('swiperWrapper');
            allMeals.forEach(m => {
                if(m.type === 'intro') {
                    wrapper.innerHTML += `<div class="swiper-slide intro-slide" data-week="${m.week}"><div class="intro-content"><h1 class="intro-num">WEEK ${m.week}</h1><div class="intro-sub">ЭХЭЛЖ БАЙНА</div></div></div>`;
                } else {
                    wrapper.innerHTML += `
                    <div class="swiper-slide" data-week="${m.week}">
                        <div class="slide-header"><h2 class="w-num">WEEK ${m.week}</h2><div class="d-name">${m.day}</div><div class="f-name">${m.name}</div></div>
                        <div class="food-container"><img src="${m.img}" class="food-img" onerror="this.style.opacity='0.1'"></div>
                        <div class="glass-panel">
                            <span class="cal-text">${m.cal} KCAL</span>
                            <div class="n-row">
                                <div class="n-box"><b>${m.p}</b><i>Уураг</i></div>
                                <div class="n-box"><b>${m.f}</b><i>Өөх</i></div>
                                <div class="n-box"><b>${m.c}</b><i>Нүүрс</i></div>
                                <div class="n-box"><b>${m.fi}</b><i>Эслэг</i></div>
                            </div>
                            <div class="star-row">
                                <span class="star" onclick="rate(this,1)">★</span><span class="star" onclick="rate(this,2)">★</span><span class="star" onclick="rate(this,3)">★</span><span class="star" onclick="rate(this,4)">★</span><span class="star" onclick="rate(this,5)">★</span>
                            </div>
                            <textarea class="comment-box" placeholder="Сэтгэгдэл үлдээх..."></textarea>
                        </div>
                    </div>`;
                }
            });

            mainSwiper = new Swiper('.swiper', { 
                direction: 'vertical', speed: 800, mousewheel: true,
                on: {
                    slideChangeTransitionStart: function() {
                        const activeSlide = this.slides[this.activeIndex];
                        const week = activeSlide.getAttribute('data-week');
                        document.body.className = 'bg-w' + week;
                        updateAura(week);

                        // АВТОМАТ ШИЛЖИЛТ (3 сек) - FIXED
                        clearTimeout(introTimer);
                        if (activeSlide.classList.contains('intro-slide')) {
                            introTimer = setTimeout(() => {
                                mainSwiper.slideNext();
                            }, 3000);
                        }
                    }
                }
            });
        };

        function updateAura(week) {
            let color = "#d4af37";
            if(week == 2) color = "#e63946";
            if(week == 3) color = "#4fc3f7";
            document.getElementById('aura').style.background = `radial-gradient(circle, ${color} 0%, transparent 60%)`;
        }

        function jumpTo(index) {
            document.getElementById('weekSelector').style.display = 'none';
            document.querySelector('.swiper').style.display = 'block';
            document.getElementById('backBtn').style.display = 'flex';
            document.getElementById('bgMusic').play().catch(() => {});
            mainSwiper.update(); 
            mainSwiper.slideTo(index, 0);
            
            // Intro Слайд бол шууд таймерыг эхлүүлнэ
            const activeSlide = mainSwiper.slides[index];
            if (activeSlide.classList.contains('intro-slide')) {
                clearTimeout(introTimer);
                introTimer = setTimeout(() => { mainSwiper.slideNext(); }, 3000);
            }
        }

        function showMenu() { document.getElementById('weekSelector').style.display = 'flex'; document.querySelector('.swiper').style.display = 'none'; document.getElementById('backBtn').style.display = 'none'; }
        function rate(el, score) { const stars = el.parentElement.querySelectorAll('.star'); stars.forEach((s, i) => i < score ? s.classList.add('active') : s.classList.remove('active')); }

        // Snow Animation
        const canvas = document.getElementById('canvas-snow');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Snowflake {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() { this.x = Math.random() * canvas.width; this.y = -10; this.size = Math.random() * 1.5 + 0.5; this.speed = Math.random() * 0.5 + 0.2; this.opacity = Math.random() * 0.3; }
            update() { this.y += this.speed; if (this.y > canvas.height) this.reset(); }
            draw() { ctx.fillStyle = `rgba(0, 0, 0, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for (let i = 0; i < 40; i++) particles.push(new Snowflake());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
