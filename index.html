<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lunch App - Төгсдэлгэрэх</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Montserrat:wght@100;300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --accent: #b8860b; /* Тансаг алтлаг */
            --bg: #121826; /* Гүн саарал-хөх */
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Montserrat', sans-serif; background: var(--bg);
            color: white; overflow: hidden;
        }

        /* 1. SPLASH SCREEN (LOGO) */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0e17; z-index: 2000; display: flex;
            justify-content: center; align-items: center; transition: 1s ease;
        }
        .logo-anim {
            width: 150px; animation: pulseLogo 2s infinite ease-in-out;
            filter: drop-shadow(0 0 20px rgba(184, 134, 11, 0.4));
        }
        @keyframes pulseLogo { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

        /* 2. WEEK SELECTOR */
        #weekSelector {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1500; background: radial-gradient(circle at center, #1e293b, #0f172a);
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .week-card {
            width: 85%; max-width: 350px; padding: 25px; margin: 12px;
            background: var(--glass); border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); border-radius: 20px; text-align: center;
            font-family: 'Cinzel'; cursor: pointer; transition: 0.3s;
        }
        .week-card:hover { border-color: var(--accent); transform: translateY(-5px); }

        /* 3. APP HEADER */
        .app-header {
            position: absolute; top: 40px; width: 100%; z-index: 100;
            text-align: center; pointer-events: none;
        }
        .week-tag { font-family: 'Cinzel'; font-size: 0.7rem; letter-spacing: 5px; color: var(--accent); }
        .day-name { font-size: 2.5rem; font-weight: 100; text-transform: uppercase; margin: 0; }

        /* 4. MAIN SWIPER (VERTICAL) */
        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { 
            display: flex; flex-direction: column; justify-content: flex-start; 
            align-items: center; padding-top: 140px; box-sizing: border-box; 
        }

        /* FOOD AREA */
        .food-box {
            position: relative; width: 100%; display: flex;
            flex-direction: column; align-items: center;
        }
        .food-img {
            width: 85vw; max-width: 380px; height: auto;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.5));
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* MODERN NUTRITION BAR */
        .nutri-bar {
            margin-top: -10px; width: 85%; max-width: 400px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px); border-radius: 15px;
            display: flex; justify-content: space-around; padding: 15px 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .n-item { text-align: center; flex: 1; }
        .n-val { display: block; font-weight: 700; font-size: 0.9rem; color: #fff; }
        .n-lab { display: block; font-size: 0.55rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        /* 5. BOTTOM CARD (RATING) */
        .bottom-card {
            position: absolute; bottom: 40px; width: 90%; max-width: 450px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            backdrop-filter: blur(30px); border-radius: 25px;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        .calorie-badge {
            font-size: 0.7rem; font-weight: 700; color: var(--accent);
            letter-spacing: 2px; margin-bottom: 8px; display: block;
        }
        .meal-title { font-size: 1rem; font-weight: 300; margin-bottom: 20px; opacity: 0.9; line-height: 1.4; }

        .stars { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .star { font-size: 2rem; color: rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .star.active { color: #ffcc00; text-shadow: 0 0 15px rgba(255, 204, 0, 0.5); }

        .comment-field {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 12px; color: white; font-family: 'Montserrat';
            font-size: 0.8rem; resize: none; outline: none; box-sizing: border-box;
        }

        /* SNOW OVERLAY */
        #canvas-snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; opacity: 0.3; }

        .back-menu {
            position: fixed; top: 25px; left: 20px; z-index: 1600;
            background: var(--glass); border: none; color: white; width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer; display: none;
        }
    </style>
</head>
<body>

    <!-- Canvas Snow -->
    <canvas id="canvas-snow"></canvas>

    <!-- 1. Splash Screen -->
    <div id="splash" onclick="hideSplash()">
        <img src="logo.png" class="logo-anim" alt="Logo">
    </div>

    <!-- 2. Week Selector -->
    <div id="weekSelector">
        <h2 style="font-family:'Cinzel'; margin-bottom: 40px; letter-spacing: 5px;">Цэс Сонгох</h2>
        <div class="week-card" onclick="loadWeek(1)">1-Р ДОЛОО ХОНОГ</div>
        <div class="week-card" onclick="loadWeek(2)">2-Р ДОЛОО ХОНОГ</div>
        <div class="week-card" onclick="loadWeek(3)">3-Р ДОЛОО ХОНОГ</div>
    </div>

    <button class="back-menu" id="backBtn" onclick="showMenu()">←</button>
    <audio id="bgMusic" src="bg-music.mp3" loop></audio>

    <!-- 3. Vertical Swiper -->
    <div class="swiper">
        <div class="swiper-wrapper" id="swiperWrapper"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const mealData = {
            1: [
                { day: "Даваа", name: "Ногооны зутан шөл, гоймонтой хуурга", cal: "640", p: "32г", f: "24г", c: "75г", fi: "10г", img: "mon1.png" },
                { day: "Мягмар", name: "Гоймонтой шөл, нарийн мах", cal: "777", p: "38г", f: "32г", c: "87г", fi: "14г", img: "tue1.png" },
                { day: "Лхагва", name: "Помидортой шөл, шарсан бугалаг", cal: "619", p: "34г", f: "19г", c: "82г", fi: "6г", img: "wed1.png" },
                { day: "Пүрэв", name: "Ногоон сонгинотой хар шөл, пирожки", cal: "664", p: "31г", f: "17г", c: "100г", fi: "7г", img: "thu1.png" },
                { day: "Баасан", name: "Хөц будаатай шөл, мантууны хавчуурга", cal: "802", p: "33г", f: "23г", c: "119г", fi: "9г", img: "fri1.png" }
            ],
            2: [ /* 2-р долоо хоногийн 5 хоолны мэдээлэл энд орно */ ],
            3: [ /* 3-р долоо хоногийн 5 хоолны мэдээлэл энд орно */ ]
        };

        let vSwiper;

        // Splash screen fade
        setTimeout(() => { hideSplash(); }, 2500);

        function hideSplash() {
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';
            setTimeout(() => { 
                splash.style.display = 'none'; 
                document.getElementById('weekSelector').style.display = 'flex';
            }, 1000);
        }

        function loadWeek(num) {
            const wrapper = document.getElementById('swiperWrapper');
            wrapper.innerHTML = '';
            
            const data = mealData[num] || mealData[1]; // Хоосон бол 1-ийг авна

            data.forEach((m) => {
                wrapper.innerHTML += `
                <div class="swiper-slide">
                    <div class="app-header">
                        <div class="week-tag">WEEK ${num}</div>
                        <h2 class="day-name">${m.day}</h2>
                    </div>

                    <div class="food-box">
                        <img src="${m.img}" class="food-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/706/706164.png'">
                        <div class="nutri-bar">
                            <div class="n-item"><span class="n-val">${m.p}</span><span class="n-lab">Уураг</span></div>
                            <div class="n-item"><span class="n-val">${m.f}</span><span class="n-lab">Өөх</span></div>
                            <div class="n-item"><span class="n-val">${m.c}</span><span class="n-lab">Нүүрс ус</span></div>
                            <div class="n-item"><span class="n-val">${m.fi}</span><span class="n-lab">Эслэг</span></div>
                        </div>
                    </div>

                    <div class="bottom-card">
                        <span class="calorie-badge">${m.cal} KCAL</span>
                        <div class="meal-title">${m.name}</div>
                        <div class="stars">
                            <span class="star" onclick="rate(this, 1)">★</span>
                            <span class="star" onclick="rate(this, 2)">★</span>
                            <span class="star" onclick="rate(this, 3)">★</span>
                            <span class="star" onclick="rate(this, 4)">★</span>
                            <span class="star" onclick="rate(this, 5)">★</span>
                        </div>
                        <textarea class="comment-field" placeholder="Сэтгэгдэл үлдээх..."></textarea>
                    </div>
                </div>`;
            });

            document.getElementById('weekSelector').style.display = 'none';
            document.getElementById('backBtn').style.display = 'block';
            document.getElementById('bgMusic').play().catch(() => {});

            if (vSwiper) vSwiper.destroy();
            vSwiper = new Swiper('.swiper', {
                direction: 'vertical',
                speed: 1000,
                mousewheel: true,
                parallax: true,
                effect: 'slide'
            });
        }

        function showMenu() {
            document.getElementById('weekSelector').style.display = 'flex';
            document.getElementById('backBtn').style.display = 'none';
        }

        function rate(el, score) {
            const stars = el.parentElement.querySelectorAll('.star');
            stars.forEach((s, i) => i < score ? s.classList.add('active') : s.classList.remove('active'));
        }

        // Snow Effect
        const canvas = document.getElementById('canvas-snow');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Snowflake {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() { this.x = Math.random() * canvas.width; this.y = -10; this.size = Math.random() * 2 + 1; this.speed = Math.random() * 0.8 + 0.3; this.opacity = Math.random() * 0.5; }
            update() { this.y += this.speed; if (this.y > canvas.height) this.reset(); }
            draw() { ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for (let i = 0; i < 50; i++) particles.push(new Snowflake());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
