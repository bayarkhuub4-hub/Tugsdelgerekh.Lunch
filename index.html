<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Үүрийн Шүүдэр Lunch - Premium UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@200;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --w1-accent: #d4af37; --w2-accent: #e63946; --w3-accent: #4fc3f7;
            --glass: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.6);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Montserrat', sans-serif; background: #fdfaf5; 
            overflow: hidden; transition: 1s ease;
        }

        /* 1. LUXURY DECORATED BACKGROUND */
        #bgContainer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background-color: #fdfaf5;
            background-image: radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 30px 30px; /* Luxury dot pattern */
        }

        .liquid-blob {
            position: absolute; width: 120vw; height: 120vw;
            top: -30%; left: -20%; border-radius: 50%;
            background: radial-gradient(circle, var(--w1-accent) 0%, transparent 70%);
            filter: blur(80px); opacity: 0.12;
            animation: rotateBlob 25s infinite linear;
            z-index: -1; transition: 1.5s ease;
        }

        @keyframes rotateBlob {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10%, 5%) scale(1.1); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* SPLASH & SELECTOR */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s ease; }
        #weekSelector { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; background: rgba(255,255,255,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); }
        .week-card { width: 85%; max-width: 320px; padding: 25px; margin: 12px; background: #fff; border-radius: 25px; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; font-family: 'Cinzel'; cursor: pointer; transition: 0.3s; }
        .week-card h3 { margin: 0; font-size: 1.1rem; }

        /* HEADER & TYPOGRAPHY */
        .slide-header { text-align: center; padding-top: 30px; z-index: 100; }
        .w-num { font-family: 'Cinzel'; font-size: 1.4rem; letter-spacing: 8px; font-weight: 900; margin: 0; }
        .d-name { font-size: 0.9rem; letter-spacing: 4px; text-transform: uppercase; margin-top: 5px; opacity: 0.5; color: #333; }
        .food-name { font-size: 1.1rem; font-weight: 800; margin-top: 20px; color: #222; max-width: 320px; line-height: 1.3; }

        /* SWIPER */
        .swiper { width: 100%; height: 100vh; display: none; }
        .swiper-slide { display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 20px; box-sizing: border-box; }

        /* HERO AREA */
        .hero-wrap { position: relative; width: 100%; flex: 1; display: flex; justify-content: center; align-items: center; margin-top: -20px; }
        .food-img { width: 88vw; max-width: 440px; height: auto; filter: drop-shadow(0 30px 60px rgba(0,0,0,0.1)); animation: floatPlate 6s infinite ease-in-out; }
        @keyframes floatPlate { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* 2. UNIFIED GLASS PANEL (Nutrition + Rating + Comment) */
        .unified-panel {
            width: 95%; max-width: 420px; padding: 20px;
            background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 35px;
            margin-top: -60px; z-index: 10; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.04);
            margin-bottom: 45px;
        }

        .cal-text { font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 15px; display: block; opacity: 0.8; }
        
        .n-row { display: flex; gap: 8px; margin-bottom: 20px; }
        .n-box { flex: 1; background: rgba(255,255,255,0.5); padding: 10px 2px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.5); }
        .n-box b { display: block; font-size: 0.85rem; color: #333; }
        .n-box i { font-style: normal; font-size: 0.5rem; text-transform: uppercase; font-weight: 700; opacity: 0.4; }

        .rating-label { font-size: 0.65rem; font-weight: 800; letter-spacing: 1px; margin-bottom: 8px; opacity: 0.5; text-transform: uppercase; }
        .star-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .star { font-size: 2rem; color: rgba(0,0,0,0.08); cursor: pointer; transition: 0.3s; }
        
        .comment-input {
            width: 100%; background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.05); border-radius: 18px;
            padding: 12px 15px; font-family: 'Montserrat'; font-size: 0.85rem; color: #333;
            resize: none; outline: none; box-sizing: border-box; height: 55px;
        }

        /* INTRO SLIDE */
        .intro-content { text-align: center; margin: auto; }
        .intro-title { font-family: 'Cinzel'; font-size: 4.5rem; font-weight: 900; margin: 0; }
        .intro-sub { font-size: 1rem; letter-spacing: 4px; font-weight: 800; opacity: 0.4; }

        /* THEME CONTROL */
        body.bg-w1 .w-num, body.bg-w1 .intro-title, body.bg-w1 .cal-text, body.bg-w1 .star.active { color: #d4af37; }
        body.bg-w2 .w-num, body.bg-w2 .intro-title, body.bg-w2 .cal-text, body.bg-w2 .star.active { color: #e63946; }
        body.bg-w3 .w-num, body.bg-w3 .intro-title, body.bg-w3 .cal-text, body.bg-w3 .star.active { color: #4fc3f7; }

        #backBtn { position: fixed; top: 20px; left: 20px; z-index: 2500; background: #fff; border: none; width: 42px; height: 42px; border-radius: 50%; display: none; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); font-size: 1rem; cursor: pointer; color: #333; }
        #canvas-snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none; opacity: 0.2; }
    </style>
</head>
<body class="bg-w1">

    <div id="bgContainer"><div id="liquidBlob" class="liquid-blob"></div></div>
    <canvas id="canvas-snow"></canvas>

    <!-- Splash -->
    <div id="splash">
        <div class="logo-box">
            <img src="logo.png" style="width:110px;">
            <div style="font-family:'Cinzel'; margin-top:20px; color:#333; letter-spacing: 1px;">ТӨГСДЭЛГЭРЭХ СУРГУУЛЬ</div>
            <div style="font-size:0.7rem; letter-spacing:3px; opacity:0.4; font-weight:800; margin-top: 5px;">ҮДИЙН ХООЛНЫ ЦЭС</div>
        </div>
    </div>

    <!-- Week Selector -->
    <div id="weekSelector">
        <h2 style="font-family:'Cinzel'; margin-bottom:40px; letter-spacing:4px; font-size: 1.2rem;">ЦЭС СОНГОХ</h2>
        <div class="week-card" style="border-top: 4px solid #d4af37;" onclick="jumpTo(0)"><h3>WEEK 1</h3><small>1-р долоо хоног</small></div>
        <div class="week-card" style="border-top: 4px solid #e63946;" onclick="jumpTo(6)"><h3>WEEK 2</h3><small>2-р долоо хоног</small></div>
        <div class="week-card" style="border-top: 4px solid #4fc3f7;" onclick="jumpTo(12)"><h3>WEEK 3</h3><small>3-р долоо хоног</small></div>
    </div>

    <button id="backBtn" onclick="showMenu()">←</button>
    <audio id="bgMusic" src="bg-music.mp3" loop></audio>

    <div class="swiper">
        <div class="swiper-wrapper" id="swiperWrapper"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const allMeals = [
            { week: 1, type: 'intro' },
            { week: 1, day: "Даваа", name: "Ногооны зутан шөл, гоймонтой хуурга", cal: "640", p: "32г", f: "24г", c: "75г", fi: "10г", img: "mon1.png" },
            { week: 1, day: "Мягмар", name: "Гоймонтой шөл, нарийн мах", cal: "777", p: "38г", f: "32г", c: "87г", fi: "14г", img: "tue1.png" },
            { week: 1, day: "Лхагва", name: "Помидортой шөл, шарсан бугалаг", cal: "619", p: "34г", f: "19г", c: "82г", fi: "6г", img: "wed1.png" },
            { week: 1, day: "Пүрэв", name: "Ногоон сонгинотой хар шөл, пирожки", cal: "664", p: "31г", f: "17г", c: "100г", fi: "7г", img: "thu1.png" },
            { week: 1, day: "Баасан", name: "Хөц будаатай шөл, мантууны хавчуурга", cal: "802", p: "33г", f: "23г", c: "119г", fi: "9г", img: "fri1.png" },
            { week: 2, type: 'intro' },
            { week: 2, day: "Даваа", name: "Өдрийн амттай хоол 2.1", cal: "600", p: "30г", f: "20г", c: "80г", fi: "5г", img: "mon2.png" },
            { week: 2, day: "Мягмар", name: "Өдрийн амттай хоол 2.2", cal: "610", p: "31г", f: "21г", c: "81г", fi: "6г", img: "tue2.png" },
            { week: 2, day: "Лхагва", name: "Өдрийн амттай хоол 2.3", cal: "620", p: "32г", f: "22г", c: "82г", fi: "7г", img: "wed2.png" },
            { week: 2, day: "Пүрэв", name: "Өдрийн амттай хоол 2.4", cal: "630", p: "33г", f: "23г", c: "83г", fi: "8г", img: "thu2.png" },
            { week: 2, day: "Баасан", name: "Өдрийн амттай хоол 2.5", cal: "640", p: "34г", f: "24г", c: "84г", fi: "9г", img: "fri2.png" },
            { week: 3, type: 'intro' },
            { week: 3, day: "Даваа", name: "Өдрийн амттай хоол 3.1", cal: "650", p: "35г", f: "25г", c: "85г", fi: "10г", img: "mon3.png" },
            { week: 3, day: "Мягмар", name: "Өдрийн амттай хоол 3.2", cal: "660", p: "36г", f: "26г", c: "86г", fi: "11г", img: "tue3.png" },
            { week: 3, day: "Лхагва", name: "Өдрийн амттай хоол 3.3", cal: "670", p: "37г", f: "27г", c: "87г", fi: "12г", img: "wed3.png" },
            { week: 3, day: "Пүрэв", name: "Өдрийн амттай хоол 3.4", cal: "680", p: "38г", f: "28г", c: "88г", fi: "13г", img: "thu3.png" },
            { week: 3, day: "Баасан", name: "Өдрийн амттай хоол 3.5", cal: "690", p: "39г", f: "29г", c: "89г", fi: "14г", img: "fri3.png" }
        ];

        let mainSwiper;
        const blob = document.getElementById('liquidBlob');

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('weekSelector').style.display = 'flex';
                }, 800);
            }, 1800);
            
            const wrapper = document.getElementById('swiperWrapper');
            allMeals.forEach(m => {
                if(m.type === 'intro') {
                    wrapper.innerHTML += `<div class="swiper-slide intro-slide" data-week="${m.week}"><div class="intro-content"><h1 class="intro-title">WEEK ${m.week}</h1><div class="intro-sub">ЭХЭЛЖ БАЙНА</div></div></div>`;
                } else {
                    wrapper.innerHTML += `
                    <div class="swiper-slide" data-week="${m.week}">
                        <div class="slide-header">
                            <h2 class="w-num">WEEK ${m.week}</h2>
                            <div class="d-name">${m.day}</div>
                            <div class="food-name">${m.name}</div>
                        </div>
                        <div class="hero-wrap"><img src="${m.img}" class="food-img" onerror="this.style.opacity='0.1'"></div>
                        <div class="unified-panel">
                            <span class="cal-text">${m.cal} KCAL</span>
                            <div class="n-row">
                                <div class="n-box"><b>${m.p}</b><i>Уураг</i></div>
                                <div class="n-box"><b>${m.f}</b><i>Өөх</i></div>
                                <div class="n-box"><b>${m.c}</b><i>Нүүрс</i></div>
                                <div class="n-box"><b>${m.fi}</b><i>Эслэг</i></div>
                            </div>
                            <div class="rating-section" style="margin-top:20px;">
                                <div class="rating-label">Үнэлгээ өгөх</div>
                                <div class="star-row">
                                    <span class="star" onclick="rate(this,1)">★</span><span class="star" onclick="rate(this,2)">★</span><span class="star" onclick="rate(this,3)">★</span><span class="star" onclick="rate(this,4)">★</span><span class="star" onclick="rate(this,5)">★</span>
                                </div>
                            </div>
                            <textarea class="comment-input" placeholder="Сэтгэгдэл үлдээх..."></textarea>
                        </div>
                    </div>`;
                }
            });

            mainSwiper = new Swiper('.swiper', { 
                direction: 'vertical', speed: 800, mousewheel: true,
                on: {
                    slideChange: function () {
                        const activeSlide = this.slides[this.activeIndex];
                        const week = activeSlide.getAttribute('data-week');
                        document.body.className = 'bg-w' + week;
                        updateBlobColor(week);
                        if (activeSlide.classList.contains('intro-slide')) {
                            setTimeout(() => { if (mainSwiper.activeIndex === Array.from(mainSwiper.slides).indexOf(activeSlide)) mainSwiper.slideNext(); }, 3000);
                        }
                    }
                }
            });
        };

        function updateBlobColor(week) {
            let color = "rgba(212, 175, 55, 0.4)";
            if(week == 2) color = "rgba(230, 57, 70, 0.4)";
            if(week == 3) color = "rgba(79, 195, 247, 0.4)";
            blob.style.background = `linear-gradient(45deg, ${color} 0%, transparent 100%)`;
        }

        function jumpTo(index) {
            document.getElementById('weekSelector').style.display = 'none';
            document.querySelector('.swiper').style.display = 'block';
            document.getElementById('backBtn').style.display = 'flex';
            document.getElementById('bgMusic').play().catch(() => {});
            mainSwiper.update(); mainSwiper.slideTo(index, 0);
        }

        function showMenu() { document.getElementById('weekSelector').style.display = 'flex'; document.querySelector('.swiper').style.display = 'none'; document.getElementById('backBtn').style.display = 'none'; }
        function rate(el, score) { const stars = el.parentElement.querySelectorAll('.star'); stars.forEach((s, i) => i < score ? s.classList.add('active') : s.classList.remove('active')); }

        // Snow (Gentle black dots for light luxury theme)
        const canvas = document.getElementById('canvas-snow');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Snowflake {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() { this.x = Math.random() * canvas.width; this.y = -10; this.size = Math.random() * 1.2 + 0.5; this.speed = Math.random() * 0.5 + 0.2; this.opacity = Math.random() * 0.2; }
            update() { this.y += this.speed; if (this.y > canvas.height) this.reset(); }
            draw() { ctx.fillStyle = `rgba(0, 0, 0, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for (let i = 0; i < 40; i++) particles.push(new Snowflake());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
