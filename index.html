<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Төгсдэлгэрэх - Үдийн Хоол</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Montserrat:wght@100;300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --accent: #d4af37;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.2);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Montserrat', sans-serif; background: #000; color: white; overflow: hidden; }

        /* background layers for each week */
        #bgMain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; transition: background 1.2s ease; background: #080c14; }

        /* SPLASH SCREEN */
        #splash { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 3000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 0.8s ease; 
        }
        .logo-anim { width: 120px; filter: drop-shadow(0 0 15px var(--accent)); margin-bottom: 20px; }
        .school-name { font-family: 'Cinzel'; font-size: 0.9rem; letter-spacing: 2px; color: #fff; text-align: center; line-height: 1.6; }

        /* WEEK SELECTOR */
        #weekSelector { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 2000; background: #000; display: none; flex-direction: column; 
            justify-content: center; align-items: center; 
        }
        .selector-title { font-family: 'Cinzel'; letter-spacing: 5px; margin-bottom: 30px; color: var(--accent); }
        .week-opt { width: 80%; max-width: 320px; padding: 20px; margin: 10px; background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(10px); border-radius: 15px; font-family: 'Cinzel'; text-align: center; cursor: pointer; transition: 0.3s; }
        .week-opt:hover { border-color: var(--accent); background: rgba(212, 175, 55, 0.1); }

        /* TRANSITION SLIDE */
        .week-intro { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; text-align: center; }
        .intro-num { font-family: 'Cinzel'; font-size: 3.5rem; font-weight: 900; color: var(--accent); margin: 0; }
        .intro-text { font-size: 0.9rem; letter-spacing: 4px; text-transform: uppercase; opacity: 0.7; margin-top: 10px; }

        /* APP HEADER */
        .header { position: absolute; top: 35px; width: 100%; z-index: 100; text-align: center; pointer-events: none; }
        .week-label { font-family: 'Cinzel'; font-size: 1.5rem; letter-spacing: 10px; color: var(--accent); font-weight: 900; }
        .day-label { font-size: 1.4rem; font-weight: 200; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }

        /* MAIN SWIPER */
        .swiper { width: 100%; height: 100vh; display: none; } /* Сонголт хийтэл нууна */
        .swiper-slide { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }

        /* FOOD AREA */
        .food-wrap { width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; margin-bottom: 20px; }
        .food-img { width: 80vw; max-width: 340px; height: auto; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.7)); animation: float 6s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* NUTRITION BAR */
        .nutri-bar { display: flex; gap: 8px; margin-top: 15px; width: 100%; max-width: 380px; justify-content: center; z-index: 20; }
        .n-card { flex: 1; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--border); padding: 10px 2px; border-radius: 12px; text-align: center; backdrop-filter: blur(5px); }
        .n-v { font-size: 0.85rem; font-weight: 800; color: #fff; display: block; }
        .n-l { font-size: 0.5rem; color: var(--accent); text-transform: uppercase; font-weight: 600; display: block; margin-top: 3px; }

        /* BOTTOM UI */
        .bottom-ui { position: absolute; bottom: 30px; width: 90%; max-width: 420px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); backdrop-filter: blur(30px); border-radius: 25px; padding: 20px; box-sizing: border-box; text-align: center; z-index: 100; }
        .cal-neon { color: var(--accent); font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 5px; display: block; }
        .m-name { font-size: 0.9rem; font-weight: 400; line-height: 1.4; margin-bottom: 12px; }
        .stars { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .star { font-size: 1.8rem; color: rgba(255,255,255,0.1); cursor: pointer; }
        .star.active { color: #ffcc00; text-shadow: 0 0 10px var(--accent); }
        .comment { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; padding: 10px; color: white; font-family: 'Montserrat'; font-size: 0.75rem; resize: none; outline: none; box-sizing: border-box; height: 50px; }

        .menu-btn { position: fixed; top: 25px; left: 20px; z-index: 2500; background: var(--glass); border: 1px solid var(--border); color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; }
        #canvas-snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; opacity: 0.4; }
    </style>
</head>
<body>

    <div id="bgMain"></div>
    <canvas id="canvas-snow"></canvas>

    <!-- Splash Screen -->
    <div id="splash">
        <img src="logo.png" class="logo-anim">
        <div class="school-name">
            ТӨГСДЭЛГЭРЭХ СУРГУУЛЬ <br>
            <span style="font-size: 0.7rem; opacity: 0.6; font-family: 'Montserrat';">ҮДИЙН ХООЛНЫ ЦЭС</span>
        </div>
    </div>

    <!-- Week Selector -->
    <div id="weekSelector">
        <h2 class="selector-title">Сонголт хийнэ үү</h2>
        <div class="week-opt" onclick="jumpTo(0)">1-Р ДОЛОО ХОНОГ</div>
        <div class="week-opt" onclick="jumpTo(6)">2-Р ДОЛОО ХОНОГ</div>
        <div class="week-opt" onclick="jumpTo(12)">3-Р ДОЛОО ХОНОГ</div>
    </div>

    <button class="menu-btn" id="backBtn" onclick="showMenu()">☰</button>
    <audio id="bgMusic" src="bg-music.mp3" loop></audio>

    <div class="swiper">
        <div class="swiper-wrapper" id="swiperWrapper"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const allMeals = [
            // WEEK 1
            { week: 1, type: 'intro' },
            { week: 1, day: "Даваа", name: "Ногооны зутан шөл, гоймонтой хуурга", cal: "640", p: "32г", f: "24г", c: "75г", fi: "10г", img: "mon1.png" },
            { week: 1, day: "Мягмар", name: "Гоймонтой шөл, нарийн мах", cal: "777", p: "38г", f: "32г", c: "87г", fi: "14г", img: "tue1.png" },
            { week: 1, day: "Лхагва", name: "Помидортой шөл, шарсан бугалаг", cal: "619", p: "34г", f: "19г", c: "82г", fi: "6г", img: "wed1.png" },
            { week: 1, day: "Пүрэв", name: "Ногоон сонгинотой хар шөл, пирожки", cal: "664", p: "31г", f: "17г", c: "100г", fi: "7г", img: "thu1.png" },
            { week: 1, day: "Баасан", name: "Хөц будаатай шөл, мантууны хавчуурга", cal: "802", p: "33г", f: "23г", c: "119г", fi: "9г", img: "fri1.png" },
            // WEEK 2
            { week: 2, type: 'intro' },
            { week: 2, day: "Даваа", name: "2-р долоо хоногийн Даваа", cal: "600", p: "30г", f: "20г", c: "80г", fi: "5г", img: "mon2.png" },
            { week: 2, day: "Мягмар", name: "2-р долоо хоногийн Мягмар", cal: "610", p: "31г", f: "21г", c: "81г", fi: "6г", img: "tue2.png" },
            { week: 2, day: "Лхагва", name: "2-р долоо хоногийн Лхагва", cal: "620", p: "32г", f: "22г", c: "82г", fi: "7г", img: "wed2.png" },
            { week: 2, day: "Пүрэв", name: "2-р долоо хоногийн Пүрэв", cal: "630", p: "33г", f: "23г", c: "83г", fi: "8г", img: "thu2.png" },
            { week: 2, day: "Баасан", name: "2-р долоо хоногийн Баасан", cal: "640", p: "34г", f: "24г", c: "84г", fi: "9г", img: "fri2.png" },
            // WEEK 3
            { week: 3, type: 'intro' },
            { week: 3, day: "Даваа", name: "3-р долоо хоногийн Даваа", cal: "650", p: "35г", f: "25г", c: "85г", fi: "10г", img: "mon3.png" },
            { week: 3, day: "Мягмар", name: "3-р долоо хоногийн Мягмар", cal: "660", p: "36г", f: "26г", c: "86г", fi: "11г", img: "tue3.png" },
            { week: 3, day: "Лхагва", name: "3-р долоо хоногийн Лхагва", cal: "670", p: "37г", f: "27г", c: "87г", fi: "12г", img: "wed3.png" },
            { week: 3, day: "Пүрэв", name: "3-р долоо хоногийн Пүрэв", cal: "680", p: "38г", f: "28г", c: "88г", fi: "13г", img: "thu3.png" },
            { week: 3, day: "Баасан", name: "3-р долоо хоногийн Баасан", cal: "690", p: "39г", f: "29г", c: "89г", fi: "14г", img: "fri3.png" }
        ];

        let mainSwiper;

        window.onload = () => {
            // Splash time 1.5s
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('weekSelector').style.display = 'flex';
                }, 800);
            }, 1500);
            
            const wrapper = document.getElementById('swiperWrapper');
            allMeals.forEach(m => {
                if(m.type === 'intro') {
                    wrapper.innerHTML += `
                    <div class="swiper-slide" data-week="${m.week}">
                        <div class="week-intro">
                            <h1 class="intro-num">WEEK ${m.week}</h1>
                            <div class="intro-text">Эхэлж байна</div>
                        </div>
                    </div>`;
                } else {
                    wrapper.innerHTML += `
                    <div class="swiper-slide" data-week="${m.week}">
                        <div class="header">
                            <div class="week-label">WEEK ${m.week}</div>
                            <div class="day-label">${m.day}</div>
                        </div>
                        <div class="food-wrap">
                            <img src="${m.img}" class="food-img" onerror="this.style.opacity='0.5'">
                            <div class="nutri-bar">
                                <div class="n-card"><span class="n-v">${m.p}</span><span class="n-l">Уураг</span></div>
                                <div class="n-card"><span class="n-v">${m.f}</span><span class="n-l">Өөх</span></div>
                                <div class="n-card"><span class="n-v">${m.c}</span><span class="n-l">Нүүрс</span></div>
                                <div class="n-card"><span class="n-v">${m.fi}</span><span class="n-l">Эслэг</span></div>
                            </div>
                        </div>
                        <div class="bottom-ui">
                            <span class="cal-neon">${m.cal} KCAL</span>
                            <div class="m-name">${m.name}</div>
                            <div class="stars"><span class="star" onclick="rate(this,1)">★</span><span class="star" onclick="rate(this,2)">★</span><span class="star" onclick="rate(this,3)">★</span><span class="star" onclick="rate(this,4)">★</span><span class="star" onclick="rate(this,5)">★</span></div>
                            <textarea class="comment" placeholder="Сэтгэгдэл үлдээх..."></textarea>
                        </div>
                    </div>`;
                }
            });

            mainSwiper = new Swiper('.swiper', {
                direction: 'vertical',
                speed: 800,
                mousewheel: true,
                on: {
                    slideChange: function () {
                        const week = this.slides[this.activeIndex].getAttribute('data-week');
                        updateBG(week);
                    }
                }
            });
        };

        function updateBG(week) {
            const bg = document.getElementById('bgMain');
            // Өнгийг гараар тохируулах (Stronger logic)
            if(week == 1) bg.style.background = "radial-gradient(circle, #1a2332, #080c14)";
            else if(week == 2) bg.style.background = "radial-gradient(circle, #1e2e28, #0a110e)";
            else if(week == 3) bg.style.background = "radial-gradient(circle, #2e241e, #110d0a)";
        }

        function jumpTo(index) {
            document.getElementById('weekSelector').style.display = 'none';
            document.querySelector('.swiper').style.display = 'block';
            document.getElementById('backBtn').style.display = 'flex';
            document.getElementById('bgMusic').play().catch(() => {});
            mainSwiper.update();
            mainSwiper.slideTo(index, 0);
            updateBG(allMeals[index].week);
        }

        function showMenu() {
            document.getElementById('weekSelector').style.display = 'flex';
            document.querySelector('.swiper').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
        }

        function rate(el, score) {
            const stars = el.parentElement.querySelectorAll('.star');
            stars.forEach((s, i) => i < score ? s.classList.add('active') : s.classList.remove('active'));
        }

        // Snow Animation
        const canvas = document.getElementById('canvas-snow');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Snowflake {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() { this.x = Math.random() * canvas.width; this.y = -10; this.size = Math.random() * 2 + 1; this.speed = Math.random() * 0.6 + 0.3; this.opacity = Math.random() * 0.5; }
            update() { this.y += this.speed; if (this.y > canvas.height) this.reset(); }
            draw() { ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for (let i = 0; i < 70; i++) particles.push(new Snowflake());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
