<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lunch App - Төгсдэлгэрэх</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@100;300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-gold: #f1c40f;
            --neon-silver: #ecf0f1;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Montserrat', sans-serif; 
            background: #0a0e14; /* Гүн шөнийн хөх-хар фон */
            color: white; overflow: hidden;
        }

        /* Animated Background Gradient */
        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #0f172a, #1e293b, #0f172a);
            z-index: -1;
        }

        /* 1. WEEK SELECTOR (Initial Screen) */
        #weekSelector {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; background: rgba(10, 14, 20, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(20px); transition: 0.8s ease;
        }

        .week-btn {
            width: 80%; max-width: 300px; padding: 20px; margin: 10px;
            background: var(--glass); border: 1px solid var(--glass-border);
            color: white; font-family: 'Cinzel'; font-size: 1.2rem;
            cursor: pointer; transition: 0.3s; border-radius: 15px;
        }
        .week-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }

        /* 2. HEADER AREA */
        .app-header {
            position: absolute; top: 30px; width: 100%; z-index: 100;
            text-align: center; pointer-events: none;
        }
        .week-indicator { font-family: 'Cinzel'; font-size: 0.8rem; letter-spacing: 4px; color: var(--neon-gold); opacity: 0.8; }
        .day-title { font-size: 2rem; font-weight: 100; text-transform: uppercase; margin-top: 5px; }

        /* 3. MAIN SWIPER */
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            padding: 20px; box-sizing: border-box; 
        }

        /* 4. FOOD IMAGE & NUTRITION CHIPS */
        .food-container {
            position: relative; width: 85vw; height: 85vw; max-width: 400px; max-height: 400px;
            display: flex; justify-content: center; align-items: center;
        }
        .food-img {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.5));
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Nutrition Chips (Floating) */
        .nutri-chip {
            position: absolute; padding: 6px 12px; background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border); backdrop-filter: blur(10px);
            border-radius: 50px; font-size: 0.7rem; font-weight: 600;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            animation: fadeIn 1s ease forwards; opacity: 0;
        }
        .nutri-chip span { color: var(--neon-gold); margin-right: 4px; }
        
        /* Positioning chips around the plate */
        .chip-1 { top: 0; left: 10%; animation-delay: 0.8s; }
        .chip-2 { top: 20%; right: -5%; animation-delay: 1s; }
        .chip-3 { bottom: 20%; left: -5%; animation-delay: 1.2s; }
        .chip-4 { bottom: 0; right: 10%; animation-delay: 1.4s; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

        /* 5. MEAL INFO & RATING (Bottom Card) */
        .bottom-card {
            position: absolute; bottom: 30px; width: 90%; max-width: 450px;
            background: var(--glass); border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px); border-radius: 30px;
            padding: 20px; box-sizing: border-box; text-align: center;
        }

        .meal-name { font-size: 1rem; font-weight: 400; margin-bottom: 15px; opacity: 0.9; }

        .stars { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .star { font-size: 1.8rem; color: rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; }
        .star.active { color: var(--neon-gold); text-shadow: 0 0 10px var(--neon-gold); }

        .comment-box {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 12px; color: white; padding: 10px; font-family: 'Montserrat';
            font-size: 0.8rem; resize: none; outline: none; margin-top: 10px;
        }

        /* 6. CALORIE BADGE */
        .calorie-neon {
            background: rgba(241, 196, 15, 0.1); border: 1px solid var(--neon-gold);
            color: var(--neon-gold); padding: 5px 15px; border-radius: 50px;
            font-size: 0.75rem; font-weight: bold; display: inline-block; margin-bottom: 10px;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.2);
        }

        /* Back to menu button */
        .menu-btn {
            position: fixed; top: 20px; right: 20px; z-index: 1001;
            background: var(--glass); border: none; color: white; padding: 10px;
            border-radius: 50%; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <!-- Week Selection Screen -->
    <div id="weekSelector">
        <h2 style="font-family:'Cinzel'; margin-bottom: 30px;">Сонголт хийнэ үү</h2>
        <button class="week-btn" onclick="loadWeek(1)">1-Р ДОЛОО ХОНОГ</button>
        <button class="week-btn" onclick="loadWeek(2)">2-Р ДОЛОО ХОНОГ</button>
        <button class="week-btn" onclick="loadWeek(3)">3-Р ДОЛОО ХОНОГ</button>
    </div>

    <button class="menu-btn" onclick="showMenu()">☰</button>
    <audio id="bgMusic" src="bg-music.mp3" loop></audio>

    <div class="swiper">
        <div class="swiper-wrapper" id="swiperWrapper">
            <!-- Slides will be injected here by JS -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Бүх 15 хоолны мэдээлэл (3 долоо хоног)
        const mealData = {
            1: [
                { day: "Даваа", name: "Ногооны зутан шөл, гоймонтой хуурга", cal: "640", protein: "32г", fat: "24г", carb: "75г", fiber: "10г", img: "mon1.png" },
                { day: "Мягмар", name: "Гоймонтой шөл, нарийн мах", cal: "777", protein: "38г", fat: "32г", carb: "87г", fiber: "14г", img: "tue1.png" },
                { day: "Лхагва", name: "Помидортой шөл, шарсан бугалаг", cal: "619", protein: "34г", fat: "19г", carb: "82г", fiber: "6г", img: "wed1.png" },
                { day: "Пүрэв", name: "Ногоон сонгинотой хар шөл, пирожки", cal: "664", protein: "31г", fat: "17г", carb: "100г", fiber: "7г", img: "thu1.png" },
                { day: "Баасан", name: "Хөц будаатай шөл, мантууны хавчуурга", cal: "802", protein: "33г", fat: "23г", carb: "119г", fiber: "9г", img: "fri1.png" }
            ],
            2: [
                // 2-р долоо хоногийн мэдээллүүдийг энд нэмнэ
                { day: "Даваа", name: "Цагаан будаа, Тахианы мах", cal: "550", protein: "30г", fat: "15г", carb: "60г", fiber: "5г", img: "mon2.png" },
                // ...
            ],
            3: [
                // 3-р долоо хоногийн мэдээллүүдийг энд нэмнэ
                { day: "Даваа", name: "Өдрийн онцлох хоол", cal: "600", protein: "25г", fat: "20г", carb: "70г", fiber: "8г", img: "mon3.png" },
                // ...
            ]
        };

        let swiper;

        function loadWeek(weekNum) {
            const wrapper = document.getElementById('swiperWrapper');
            wrapper.innerHTML = ''; // Өмнөх слайдыг устгах
            
            const currentWeek = mealData[weekNum];
            
            currentWeek.forEach((meal, index) => {
                const slide = `
                <div class="swiper-slide">
                    <div class="app-header">
                        <div class="week-indicator">WEEK ${weekNum}</div>
                        <div class="day-title">${meal.day}</div>
                    </div>

                    <div class="food-container">
                        <img src="${meal.img}" class="food-img">
                        <div class="nutri-chip chip-1"><span>Уураг</span> ${meal.protein}</div>
                        <div class="nutri-chip chip-2"><span>Өөх</span> ${meal.fat}</div>
                        <div class="nutri-chip chip-3"><span>Нүүрс ус</span> ${meal.carb}</div>
                        <div class="nutri-chip chip-4"><span>Эслэг</span> ${meal.fiber}</div>
                    </div>

                    <div class="bottom-card">
                        <div class="calorie-neon">${meal.cal} ккал</div>
                        <div class="meal-name">${meal.name}</div>
                        
                        <div class="stars" data-id="${weekNum}-${index}">
                            <span class="star" onclick="rate(this, 1)">★</span>
                            <span class="star" onclick="rate(this, 2)">★</span>
                            <span class="star" onclick="rate(this, 3)">★</span>
                            <span class="star" onclick="rate(this, 4)">★</span>
                            <span class="star" onclick="rate(this, 5)">★</span>
                        </div>
                        <textarea class="comment-box" placeholder="Сэтгэгдэл бичих... (заавал биш)"></textarea>
                    </div>
                </div>`;
                wrapper.innerHTML += slide;
            });

            document.getElementById('weekSelector').style.transform = 'translateY(-100%)';
            document.getElementById('bgMusic').play();

            // Swiper Initialize with Modern Creative Effect
            if (swiper) swiper.destroy();
            swiper = new Swiper('.swiper', {
                effect: 'creative',
                creativeEffect: {
                    prev: { shadow: true, translate: ['-20%', 0, -1] },
                    next: { translate: ['100%', 0, 0] },
                },
                speed: 600,
                grabCursor: true
            });
        }

        function showMenu() {
            document.getElementById('weekSelector').style.transform = 'translateY(0)';
        }

        function rate(el, score) {
            const stars = el.parentElement.querySelectorAll('.star');
            stars.forEach((s, i) => i < score ? s.classList.add('active') : s.classList.remove('active'));
            // Google Sheets рүү илгээх кодыг энд нэмнэ
        }
    </script>
</body>
</html>
